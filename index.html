<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa Logístico Paraguay</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
    }

    .header{
      background:#002b5c;
      color:white;
      padding:16px 24px;
      font-size:24px;
      font-weight:bold;
      box-shadow:0 2px 8px rgba(0,0,0,0.2);
    }

    #map{
      width:100%;
      height:92vh;
    }

    .popup-title{
      font-size:18px;
      font-weight:bold;
      color:#002b5c;
      margin-bottom:8px;
    }

    .popup-info{
      font-size:14px;
      line-height:1.6;
    }

    .legend {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      line-height: 1.8;
    }

    .legend h4{
      margin-bottom:8px;
      color:#002b5c;
    }

  </style>
</head>
<body>

  <div class="header">
    Mapa de Centros Logísticos y Distribución - Paraguay
  </div>

  <div id="map"></div>

  <script>

    // =========================
    // MAPA PARAGUAY
    // =========================

    const map = L.map('map', {
      zoomControl: true,
      minZoom: 6,
      maxZoom: 10
    }).setView([-23.4, -58.4], 6);

    // Limitar navegación a Paraguay
    const bounds = [
      [-27.7, -62.8],
      [-19.0, -53.0]
    ];

    map.setMaxBounds(bounds);

    // =========================
    // MAPA BASE
    // =========================

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // =========================
    // ICONOS
    // =========================

    function crearIcono(color) {
      return L.divIcon({
        html: `
          <div style="
            background:${color};
            width:24px;
            height:24px;
            border-radius:50%;
            border:4px solid white;
            box-shadow:0 0 10px rgba(0,0,0,0.4);
          "></div>
        `,
        className: "",
        iconSize: [24,24]
      });
    }

    const iconoCD = crearIcono("#007bff");
    const iconoLogistico = crearIcono("#28a745");

    // =========================
    // UBICACIONES
    // =========================

    const ubicaciones = [

      // SAN ANTONIO
      {
        nombre: "Bebidas del Paraguay",
        tipo: "Centro Logístico y Centro de Distribución",
        ciudad: "San Antonio",
        lat: -25.4212,
        lng: -57.5470,
        icono: iconoCD
      },

      {
        nombre: "Pepsi",
        tipo: "Centro Logístico",
        ciudad: "San Antonio",
        lat: -25.4265,
        lng: -57.5400,
        icono: iconoLogistico
      },

      // MARIA AUXILIADORA
      {
        nombre: "Centro de Distribución",
        tipo: "Centro de Distribución",
        ciudad: "María Auxiliadora",
        lat: -26.8877,
        lng: -55.2263,
        icono: iconoCD
      },

      // KATUETE
      {
        nombre: "Centro de Distribución",
        tipo: "Centro de Distribución",
        ciudad: "Katueté",
        lat: -24.1455,
        lng: -54.7594,
        icono: iconoCD
      },

      // LIBERACION
      {
        nombre: "Centro de Distribución",
        tipo: "Centro de Distribución",
        ciudad: "Liberación",
        lat: -24.3998,
        lng: -56.6472,
        icono: iconoCD
      },

      // MISIONES
      {
        nombre: "Centro de Distribución",
        tipo: "Centro de Distribución",
        ciudad: "Misiones",
        lat: -26.8766,
        lng: -56.8496,
        icono: iconoCD
      },

      // ENCARNACION
      {
        nombre: "Centro Logístico y Centro de Distribución",
        tipo: "Centro Logístico y Centro de Distribución",
        ciudad: "Encarnación",
        lat: -27.3306,
        lng: -55.8667,
        icono: iconoLogistico
      },

      // CORONEL OVIEDO
      {
        nombre: "Centro Logístico y Centro de Distribución",
        tipo: "Centro Logístico y Centro de Distribución",
        ciudad: "Coronel Oviedo",
        lat: -25.4444,
        lng: -56.4403,
        icono: iconoLogistico
      },

      // CIUDAD DEL ESTE
      {
        nombre: "Centro Logístico y Centro de Distribución",
        tipo: "Centro Logístico y Centro de Distribución",
        ciudad: "Ciudad del Este",
        lat: -25.5167,
        lng: -54.6167,
        icono: iconoLogistico
      }

    ];

    // =========================
    // MARCADORES
    // =========================

    ubicaciones.forEach(punto => {

      const marker = L.marker([punto.lat, punto.lng], {
        icon: punto.icono
      }).addTo(map);

      marker.bindPopup(`
        <div class="popup-title">
          ${punto.ciudad}
        </div>

        <div class="popup-info">
          <b>Ubicación:</b> ${punto.nombre}<br>
          <b>Tipo:</b> ${punto.tipo}
        </div>
      `);

    });

    // =========================
    // LEYENDA
    // =========================

    const legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {

      const div = L.DomUtil.create("div", "legend");

      div.innerHTML = `
        <h4>Leyenda</h4>

        <div>
          <span style="color:#007bff;">⬤</span>
          Centro de Distribución
        </div>

        <div>
          <span style="color:#28a745;">⬤</span>
          Centro Logístico
        </div>
      `;

      return div;
    };

    legend.addTo(map);

  </script>

</body>
</html>
